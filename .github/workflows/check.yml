name: NGA Monitor
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check NGA
        run: |
          # 你的 UID 列表
          UIDS=("557398" "26529713")
          
          for UID in "${UIDS[@]}"; do
            echo "正在检查 UID: ${UID} ..."
            
            # 使用更简单的访问方式，并添加 User-Agent 伪装成浏览器
            STATUS_CODE=$(curl -o /dev/null -s -w "%{http_code}" -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36" "https://bbs.nga.cn/nuke.php?func=ucp&uid=${UID}")
            
            echo "NGA 响应状态码: ${STATUS_CODE}"
            
            if [ "$STATUS_CODE" -eq 200 ]; then
              # 发送 Telegram 通知
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
                   -d "chat_id=${{ secrets.TG_CHAT_ID }}&text=✅ NGA监控已成功连接！用户 ${UID} 目前在线或有更新。"
            else
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
                   -d "chat_id=${{ secrets.TG_CHAT_ID }}&text=❌ 监控 UID ${UID} 失败，状态码: ${STATUS_CODE}。可能是被 NGA 暂时拦截了。"
            fi
          done
